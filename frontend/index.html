<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspoBot — Assistant IA Transport</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; }
        header { background: #1a56db; color: white; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
        header h1 { font-size: 1.4rem; }
        .container { display: grid; grid-template-columns: 1fr 2fr; gap: 1.5rem; padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 1rem; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
        .stat { background: #eff6ff; border-radius: 8px; padding: 0.8rem; text-align: center; }
        .stat .val { font-size: 1.8rem; font-weight: bold; color: #1a56db; }
        .stat .lbl { font-size: 0.75rem; color: #64748b; }
        .chat-box { height: 400px; overflow-y: auto; border: 1px solid #e2e8f0; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; background: #f8fafc; }
        .msg { margin-bottom: 0.8rem; display: flex; flex-direction: column; }
        .msg.user { align-items: flex-end; }
        .bubble { padding: 0.6rem 1rem; border-radius: 12px; max-width: 85%; font-size: 0.9rem; line-height: 1.5; }
        .msg.user .bubble { background: #1a56db; color: white; }
        .msg.bot .bubble { background: white; border: 1px solid #e2e8f0; }
        .msg.bot .bubble .bot-title { font-weight: 600; margin-bottom: 0.45rem; color: #1f2937; }
        .chat-inline-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 0.25rem; }
        .chat-inline-table th { background: #eff6ff; color: #1a56db; text-align: left; padding: 0.35rem; border: 1px solid #dbeafe; }
        .chat-inline-table td { padding: 0.35rem; border: 1px solid #e2e8f0; color: #334155; }
        .chat-input { display: flex; gap: 0.5rem; }
        .chat-input input { flex: 1; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.7rem; outline: none; }
        .chat-input button { background: #1a56db; color: white; border: none; border-radius: 8px; padding: 0.7rem 1.2rem; cursor: pointer; }
        .chat-input button:disabled { background: #94a3b8; cursor: not-allowed; }
        .results table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .results th { background: #1a56db; color: white; padding: 0.5rem; text-align: left; }
        .results td { padding: 0.5rem; border-bottom: 1px solid #e2e8f0; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; font-weight: 600; }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-orange { background: #fff7ed; color: #9a3412; }
    </style>
</head>
<body>
    <header><span>🚌</span><h1>TranspoBot</h1></header>
    <div class="container">
        <div>
            <div class="card">
                <h2>📊 Dashboard</h2>
                <div class="stats-grid" id="stats">
                    <div class="stat"><div class="val">—</div><div class="lbl">Terminés</div></div>
                    <div class="stat"><div class="val">—</div><div class="lbl">En cours</div></div>
                    <div class="stat"><div class="val">—</div><div class="lbl">Véhicules</div></div>
                    <div class="stat"><div class="val">—</div><div class="lbl">Incidents</div></div>
                </div>
            </div>
            <div class="card">
                <h2>🕒 Trajets récents</h2>
                <div class="results" id="trajets-table">Chargement...</div>
            </div>
        </div>
        <div class="card">
            <h2>💬 Assistant IA</h2>
            <p id="api-status" style="font-size:0.8rem; color:#64748b; margin:0.4rem 0 0.8rem 0;">Vérification du backend...</p>
            <div class="chat-box" id="chat-box"></div>
            <div class="chat-input">
                <input type="text" id="user-input" placeholder="Posez une question...">
                <button id="send-btn" onclick="sendMessage()">Envoyer</button>
            </div>
            <div id="results-section" style="margin-top:1rem; display:none">
                <h3>📋 Résultats détaillés</h3>
                <div class="results" id="results-table"></div>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin.startsWith('http')
            ? window.location.origin
            : 'http://127.0.0.1:8000';

        function escapeHtml(text = '') {
            return String(text).replace(/[&<>"']/g, (m) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[m]));
        }

        function setApiStatus(message, color = '#64748b') {
            const status = document.getElementById('api-status');
            status.textContent = message;
            status.style.color = color;
        }

        async function loadData() {
            try {
                const health = await fetch(`${API}/`);
                if (!health.ok) throw new Error('Backend non joignable');
                setApiStatus('Backend connecté.', '#166534');

                // Stats
                const rs = await fetch(`${API}/api/stats`);
                if (!rs.ok) throw new Error('Impossible de charger les statistiques');
                const ds = await rs.json();
                const v = [ds.total_trajets, ds.trajets_en_cours, ds.vehicules_actifs, ds.incidents_ouverts];
                document.querySelectorAll('.val').forEach((el, i) => el.textContent = v[i]);

                // Trajets
                const rt = await fetch(`${API}/api/trajets/recent`);
                if (!rt.ok) throw new Error('Impossible de charger les trajets récents');
                const dt = await rt.json();
                const rows = dt.map(t => `<tr><td>${t.ligne}</td><td>${t.chauffeur_nom}</td><td><span class="badge ${t.statut==='termine'?'badge-green':'badge-orange'}">${t.statut}</span></td></tr>`).join('');
                document.getElementById('trajets-table').innerHTML = `<table><thead><tr><th>Ligne</th><th>Chauffeur</th><th>Statut</th></tr></thead><tbody>${rows}</tbody></table>`;
            } catch(e) {
                setApiStatus(`Backend indisponible: ${e.message}`, '#b91c1c');
                addMsg('bot', 'Le backend est indisponible. Vérifiez que FastAPI est lancé sur le port 8000.');
                console.error('Erreur de chargement', e);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const button = document.getElementById('send-btn');
            const q = input.value.trim();
            if(!q) return;
            input.value = '';
            input.disabled = true;
            button.disabled = true;
            addMsg('user', q);
            addMsg('bot', 'TranspoBot réfléchit... 0s');
            let seconds = 0;
            const waitTimer = setInterval(() => {
                seconds += 1;
                updateLastBotMessage(`TranspoBot réfléchit... ${seconds}s`);
            }, 1000);
            
            try {
                const r = await fetch(`${API}/api/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ question: q })
                });
                if (!r.ok) {
                    let errorMessage = 'Erreur serveur';
                    try {
                        const errorBody = await r.json();
                        errorMessage = errorBody.detail || errorBody.message || errorMessage;
                    } catch (_) {}
                    throw new Error(errorMessage);
                }
                const d = await r.json();
                removeLastBotMessage();
                if(d.data && d.data.length > 0) {
                    addDataMsg('Résultats', d.data);
                    document.getElementById('results-section').style.display = 'none';
                } else {
                    addMsg('bot', d.answer || 'Aucune donnée trouvée.');
                    document.getElementById('results-section').style.display = 'none';
                }
            } catch(e) {
                removeLastBotMessage();
                addMsg('bot', `Erreur de connexion au chat: ${e.message}`);
            } finally {
                clearInterval(waitTimer);
                input.disabled = false;
                button.disabled = false;
                input.focus();
            }
        }

        function removeLastBotMessage() {
            const list = document.querySelectorAll('#chat-box .msg.bot');
            const last = list[list.length - 1];
            if (last) last.remove();
        }

        function updateLastBotMessage(text) {
            const bubbles = document.querySelectorAll('#chat-box .msg.bot .bubble');
            const lastBubble = bubbles[bubbles.length - 1];
            if (lastBubble) {
                lastBubble.textContent = text;
            }
        }

        function addMsg(role, text) {
            const b = document.getElementById('chat-box');
            b.innerHTML += `<div class="msg ${role}"><div class="bubble">${escapeHtml(text)}</div></div>`;
            b.scrollTop = b.scrollHeight;
        }

        function addDataMsg(title, data) {
            const b = document.getElementById('chat-box');
            const keys = Object.keys(data[0]);
            const limitedRows = data.slice(0, 8);
            const h = `<tr>${keys.map(k => `<th>${escapeHtml(k)}</th>`).join('')}</tr>`;
            const r = limitedRows.map(row => `<tr>${keys.map(k => `<td>${escapeHtml(row[k] ?? '')}</td>`).join('')}</tr>`).join('');
            const extra = data.length > limitedRows.length
                ? `<div style="margin-top:0.35rem;color:#64748b;font-size:0.75rem;">${escapeHtml(data.length - limitedRows.length)} lignes supplémentaires non affichées.</div>`
                : '';

            b.innerHTML += `
                <div class="msg bot">
                    <div class="bubble">
                        <div class="bot-title">${escapeHtml(title)}</div>
                        <table class="chat-inline-table"><thead>${h}</thead><tbody>${r}</tbody></table>
                        ${extra}
                    </div>
                </div>`;
            b.scrollTop = b.scrollHeight;
        }

        window.onload = () => {
            loadData();
            document.getElementById('user-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        };
    </script>
</body>
</html>
